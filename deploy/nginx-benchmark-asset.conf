server {
    listen 80;
    server_name benchmark.jy-video.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name benchmark.jy-video.cn;

    ssl_certificate /etc/letsencrypt/live/benchmark.jy-video.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/benchmark.jy-video.cn/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:benchmark_asset_ssl:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=31536000" always;

    root /opt/benchmarkAsset/frontend/dist;
    index index.html;

    client_max_body_size 50m;
    auth_basic "Benchmark Asset";
    auth_basic_user_file /etc/nginx/.benchmark-asset.htpasswd;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /images/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
